<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="{% if page.url == '/' %}page-home{% else %}page-inner{% endif %}">

  <!-- El navbar siempre arriba, como pidió el usuario -->
  {% include navbar.html %}

  <div class="layout-wrapper">
    <!-- El sidebar solo se muestra si NO estamos en la landing (index.html) -->
    {% if page.url != '/' %}
    <aside class="sidebar">
      <h3 class="sidebar-title">Contenido</h3>
      <ul class="sidebar-nav">
        <li class="nav-section">Infraestructura</li>
        <li><a href="/infraestructura">Casos de Estudio</a></li>
        <li><a href="/docker-desktop.html">Docker Desktop</a></li>
        
        <li class="nav-section mt-4">Ciberseguridad</li>
        <li><a href="/ciberseguridad">Auditorías y Logs</a></li>
        <li><a href="/ngrok-control-remoto.html">Ngrok Control Remoto</a></li>
      </ul>
    </aside>
    {% endif %}

    <!-- El contenido principal de cada archivo Markdown/HTML caerá aquí -->
    <main class="main-content {% if page.url == '/' %}main-home{% endif %}">
      {% if page.url == '/' %}
        {{ content }}
      {% else %}
        <div class="content-container">
          {{ content }}
        </div>
      {% endif %}
    </main>
  </div>

</body>
</html>
